<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00ff88;
      --accent2: #ff3d6b;
      --text: #e8e8e8;
      --muted: #666;
      --done: #333;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    h1 span { color: var(--accent); }

    .badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      background: var(--accent);
      color: #000;
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    .status-bar {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .status-bar span { color: var(--accent); }

    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1rem;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    button {
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 1px;
      border: none;
      padding: 0.75rem 1.25rem;
      transition: all 0.15s;
    }

    .btn-add {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .btn-add:hover { background: #00cc6a; }

    .task-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem 1.25rem;
      transition: border-color 0.2s;
    }

    .task-item:hover { border-color: #444; }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--muted); }

    .task-id {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      min-width: 30px;
    }

    .task-title { flex: 1; font-size: 1rem; }

    .btn-toggle {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.35rem 0.75rem;
      font-size: 0.7rem;
    }

    .btn-toggle:hover { background: var(--accent); color: #000; }

    .task-item.done .btn-toggle {
      border-color: var(--muted);
      color: var(--muted);
    }

    .btn-delete {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.75rem;
      font-size: 0.7rem;
    }

    .btn-delete:hover { border-color: var(--accent2); color: var(--accent2); }

    .empty {
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem;
      text-align: center;
      border: 1px dashed var(--border);
    }

    .error { color: var(--accent2); font-family: 'Space Mono', monospace; font-size: 0.8rem; margin-bottom: 1rem; }

    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>Task<span>Manager</span></h1>
    <span class="badge">DEVOPS LAB</span>
  </header>

  <div class="status-bar">
    API: <span id="api-status">checking...</span> &nbsp;|&nbsp;
    Tasks: <span id="task-count">0</span> total, <span id="done-count">0</span> done
  </div>

  <div class="input-row">
    <input type="text" id="task-input" placeholder="Enter a new task..." />
    <button class="btn-add" onclick="addTask()">+ ADD</button>
  </div>

  <div id="error" class="error" style="display:none"></div>
  <div class="task-list" id="task-list"></div>

  <footer>
    Frontend: nginx:alpine &nbsp;|&nbsp; Backend: node:18-alpine &nbsp;|&nbsp;
    Orchestration: docker-compose &nbsp;|&nbsp; CI/CD: Jenkins
  </footer>

  <script>
    const API = 'https://taskmanager-192t.onrender.com/api';

    async function fetchTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        const tasks = await res.json();
        renderTasks(tasks);
        document.getElementById('api-status').textContent = '● CONNECTED';
        document.getElementById('api-status').style.color = '#00ff88';
      } catch {
        document.getElementById('api-status').textContent = '● OFFLINE';
        document.getElementById('api-status').style.color = '#ff3d6b';
        renderTasks([]);
      }
    }

    function renderTasks(tasks) {
      document.getElementById('task-count').textContent = tasks.length;
      document.getElementById('done-count').textContent = tasks.filter(t => t.done).length;
      const list = document.getElementById('task-list');
      if (!tasks.length) {
        list.innerHTML = '<div class="empty">// no tasks yet. add one above.</div>';
        return;
      }
      list.innerHTML = tasks.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}">
          <span class="task-id">#${String(t.id).padStart(3,'0')}</span>
          <span class="task-title">${escHtml(t.title)}</span>
          <button class="btn-toggle" onclick="toggleTask(${t.id})">${t.done ? 'UNDO' : 'DONE'}</button>
          <button class="btn-delete" onclick="deleteTask(${t.id})">DEL</button>
        </div>
      `).join('');
    }

    async function addTask() {
      const input = document.getElementById('task-input');
      const title = input.value.trim();
      if (!title) return showError('Task title cannot be empty.');
      try {
        await fetch(`${API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        input.value = '';
        hideError();
        fetchTasks();
      } catch { showError('Could not connect to backend.'); }
    }

    async function toggleTask(id) {
      await fetch(`${API}/tasks/${id}`, { method: 'PUT' });
      fetchTasks();
    }

    async function deleteTask(id) {
      await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      fetchTasks();
    }

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = '⚠ ' + msg;
      el.style.display = 'block';
    }

    function hideError() { document.getElementById('error').style.display = 'none'; }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    fetchTasks();
  </script>
</body>
</html>
